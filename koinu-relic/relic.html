<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KOINU RELIC</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
    #status {
      position: fixed; top: 12px; left: 14px;
      color: #ff0; font-size: 13px; z-index: 99;
      text-shadow: 0 0 8px #ff0;
    }
    #fail {
      display: none; position: fixed; inset: 0;
      background: #0a0000; color: #f44;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 20px; text-align: center; padding: 40px;
    }
  </style>
</head>
<body>
<div id="status">VERIFYING ON-CHAIN...</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// KOINU RELIC — Cryptographically Verified Digital Artifact on Dogecoin
// Powered by api.wzrd.dog (dog indexer)
//
// To mint a new Relic:
//   1. Run:  dog koinu-relic gen <txid>
//   2. Copy the output TXID value below
//   3. Inscribe this entire file
//
// Only TXID needs to change per relic. Everything else (blockhash, merkle
// proof, timestamp) is fetched and verified at render time from api.wzrd.dog.
// ─────────────────────────────────────────────────────────────────────────────

const DOG_SERVER = "https://api.wzrd.dog";

// ← REPLACE WITH THE TXID OF THE HISTORIC TRANSACTION THIS RELIC COMMEMORATES
const TXID = "PASTE_TXID_HERE";

// ─── Crypto helpers ──────────────────────────────────────────────────────────

async function sha256(hex) {
  const bytes = new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
  const buf = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function doubleSHA256(hex) {
  return sha256(await sha256(hex));
}

// Reverse a hex string's byte order (display ↔ natural byte order)
function rev(hex) {
  return hex.match(/.{2}/g).reverse().join("");
}

// Verify a merkle inclusion proof.
// All hashes (txid, proof entries, returned root) are in display byte order.
async function verifyMerkleProof(txid, proof) {
  let cur = rev(txid);
  for (const p of proof) {
    const side    = p[0];          // "L" or "r"
    const sibling = rev(p.slice(2));
    cur = await doubleSHA256(side === "L" ? sibling + cur : cur + sibling);
  }
  return rev(cur); // back to display format
}

// ─── Main ────────────────────────────────────────────────────────────────────

async function verifyAndRender() {
  const statusEl = document.getElementById("status");

  try {
    // 1. Fetch raw transaction hex
    statusEl.textContent = "Fetching transaction...";
    const txHex = await fetch(`${DOG_SERVER}/r/tx/${TXID}`).then(r => {
      if (!r.ok) throw `HTTP ${r.status} fetching tx`;
      return r.text();
    });

    // 2. Verify txid (double-SHA256 of raw tx bytes = txid in natural order)
    statusEl.textContent = "Verifying transaction hash...";
    const computed = rev(await doubleSHA256(txHex));
    if (computed !== TXID) throw "Transaction hash mismatch — data tampered";

    // 3. Fetch merkle proof + block info in one call
    statusEl.textContent = "Fetching merkle proof...";
    const proof = await fetch(`${DOG_SERVER}/r/txproof/${TXID}`).then(r => {
      if (!r.ok) throw `HTTP ${r.status} fetching proof`;
      return r.json();
    });

    // 4. Verify merkle inclusion
    statusEl.textContent = "Verifying merkle proof...";
    const computedRoot = await verifyMerkleProof(TXID, proof.proof);
    if (computedRoot !== proof.merkleroot) throw "Merkle proof invalid — not in this block";

    // 5. Auto-detect coinbase (first input prevout = 32 zero bytes at offset 10)
    const isCoinbase = txHex.slice(10, 74) === "0".repeat(64);

    // 6. Reveal tx to get "Minted by …"
    statusEl.textContent = "Decoding minter...";
    const selfInscriptionId = typeof INSCRIPTION_ID !== "undefined" ? INSCRIPTION_ID : null;
    let minter = "unknown";
    if (selfInscriptionId) {
      const revealTxid = selfInscriptionId.replace(/i\d+$/, "");
      try {
        const revHex = await fetch(`${DOG_SERVER}/r/tx/${revealTxid}`).then(r => r.text());
        minter = extractFirstAddress(revHex) || "unknown";
      } catch (_) {}
    }

    // 7. Timestamps and block age
    const mintDate  = new Date(proof.time * 1000);
    const ageYears  = ((Date.now() / 1000 - proof.time) / (365.25 * 86400)).toFixed(1);
    const dateLabel = mintDate.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

    // 8. Extract any miner message embedded in the coinbase script
    const embedded  = isCoinbase ? extractEmbeddedText(txHex) : "KOINU";

    statusEl.textContent = "";

    // 9. Render
    document.body.innerHTML = `<canvas id="c" width="860" height="860" style="display:block;margin:auto"></canvas>`;
    const ctx = document.getElementById("c").getContext("2d");

    if (isCoinbase) {
      drawCoinbaseRelic(ctx, dateLabel, ageYears, embedded, minter, proof.height);
    } else {
      drawStandardRelic(ctx, dateLabel, ageYears, embedded, minter, proof.height);
    }

  } catch (err) {
    statusEl.textContent = "";
    document.body.innerHTML = `
      <div style="position:fixed;inset:0;background:#0a0000;color:#f44;
                  display:flex;flex-direction:column;align-items:center;
                  justify-content:center;font-family:monospace;text-align:center;padding:40px">
        <div style="font-size:28px;margin-bottom:20px">VERIFICATION FAILED</div>
        <div style="font-size:14px;opacity:0.8;max-width:600px">${err}</div>
        <div style="font-size:11px;opacity:0.5;margin-top:20px">
          Koinu Relic — The math doesn't lie
        </div>
      </div>`;
  }
}

// ─── Data extraction helpers ─────────────────────────────────────────────────

function extractEmbeddedText(txHex) {
  let str = "";
  for (let i = 0; i < txHex.length; i += 2) {
    const b = parseInt(txHex.substr(i, 2), 16);
    if (b >= 32 && b <= 126) str += String.fromCharCode(b);
  }
  const words = (str.match(/[A-Za-z0-9./]{4,}/g) || []).filter(w => !/^0+$/.test(w));
  words.sort((a, b) => b.length - a.length);
  return words[0] || "KOINU";
}

function extractFirstAddress(txHex) {
  // Very lightweight heuristic: look for a Dogecoin P2PKH address marker (version 0x1e)
  // followed by 20 bytes in the scriptPubKey.  This is not a full parser — it finds
  // the first P2PKH output and returns a placeholder; the full address would require
  // base58check encoding which adds ~30 lines.  For now we return the first 8 hex chars.
  const marker = "76a914"; // OP_DUP OP_HASH160 OP_PUSHBYTES_20
  const idx = txHex.indexOf(marker);
  if (idx === -1) return null;
  return txHex.slice(idx + 6, idx + 6 + 40); // 20 bytes = 40 hex chars (raw pubkey hash)
}

// ─── Standard relic — Dogecoin gold / Shiba Inu palette ─────────────────────

function drawStandardRelic(ctx, dateLabel, ageYears, embedded, minter, blockHeight) {
  const W = 860, H = 860;

  // Background
  ctx.fillStyle = "#1a0e00";
  ctx.fillRect(0, 0, W, H);
  ctx.shadowColor = "#ffa500";
  ctx.shadowBlur = 0;

  // Grid
  ctx.strokeStyle = "#2a1800";
  ctx.lineWidth = 1;
  for (let x = 20; x < W - 20; x += 22) { ctx.beginPath(); ctx.moveTo(x, 20); ctx.lineTo(x, H - 20); ctx.stroke(); }
  for (let y = 20; y < H - 20; y += 22) { ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(W - 20, y); ctx.stroke(); }

  // Gold circuit blocks — dense, irregular
  const GOLD = ["#ffaa00", "#ffcc33", "#dd8800", "#ffbb11", "#cc7700"];
  const BLOCKS = [
    [38, 34, 108, 66], [165, 22, 72, 102], [292, 68, 118, 54], [436, 30, 84, 88],
    [578, 58, 96, 112], [70, 174, 134, 58], [228, 148, 84, 104], [384, 192, 110, 62],
    [618, 164, 70, 118], [44, 302, 76, 128], [184, 332, 112, 56], [358, 268, 90, 110],
    [524, 308, 102, 72], [698, 274, 56, 108], [88, 442, 124, 78], [246, 480, 78, 92],
    [408, 422, 108, 74], [566, 464, 80, 90], [722, 408, 54, 82], [34, 598, 96, 82],
    [178, 634, 116, 66], [352, 574, 84, 118], [512, 628, 90, 56], [672, 578, 80, 90],
    [116, 718, 72, 98], [262, 752, 104, 54], [438, 698, 80, 90], [590, 744, 86, 56],
  ];
  BLOCKS.forEach(([x, y, w, h], i) => {
    ctx.shadowBlur = 18;
    ctx.shadowColor = "#ffaa00";
    ctx.fillStyle = GOLD[i % GOLD.length];
    ctx.globalAlpha = 0.88;
    ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = "#ffe088";
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 8;
    ctx.strokeRect(x + 3, y + 3, w - 6, h - 6);
  });
  ctx.shadowBlur = 0;

  // Central core
  ctx.fillStyle = "#2a1a00";
  ctx.fillRect(226, 238, 408, 384);
  ctx.shadowBlur = 44;
  ctx.shadowColor = "#ffcc44";
  ctx.strokeStyle = "#ffcc44";
  ctx.lineWidth = 10;
  ctx.strokeRect(236, 248, 388, 364);

  // KOINU title
  ctx.shadowBlur = 28;
  ctx.shadowColor = "#ffdd66";
  ctx.fillStyle = "#ffee88";
  ctx.font = "bold 90px monospace";
  ctx.textAlign = "center";
  ctx.fillText("KOINU", W / 2, 388);
  ctx.font = "bold 26px monospace";
  ctx.fillStyle = "#ffcc55";
  ctx.fillText("RELIC", W / 2, 438);

  // Block height
  ctx.font = "bold 18px monospace";
  ctx.fillStyle = "#ff9900";
  ctx.fillText(`BLOCK  #${blockHeight.toLocaleString()}`, W / 2, 478);

  // Embedded text (miner tag / pool name for coinbase, else "KOINU")
  ctx.shadowBlur = 10;
  ctx.font = "16px monospace";
  ctx.fillStyle = "#cc8800";
  ctx.fillText(embedded, W / 2, 512);

  // Scattered technical labels
  ctx.shadowBlur = 5;
  ctx.font = "12px monospace";
  ctx.fillStyle = "#cc9933";
  const LABELS = ["DOGE", "KOINU", "ORD", "INSC", "TXID", "MERKLE", "PROOF", "SHA256D", "0xD06E", "P2PKH", "WZRD", "CHAIN"];
  LABELS.forEach((lbl, i) => {
    ctx.fillText(lbl, 54 + (i % 10) * 74, 56 + Math.floor(i / 10) * 88);
  });

  // Age / verified label inside core
  ctx.shadowBlur = 0;
  ctx.font = "13px monospace";
  ctx.fillStyle = "#998844";
  ctx.fillText(`${ageYears} years old  •  Merkle Verified  •  The math doesn't lie`, W / 2, 566);

  // Bottom bar
  ctx.fillStyle = "#1f1000";
  ctx.fillRect(0, H - 82, W, 82);
  ctx.shadowBlur = 16;
  ctx.shadowColor = "#ffcc00";
  ctx.strokeStyle = "#ffcc00";
  ctx.lineWidth = 4;
  ctx.strokeRect(16, H - 72, W - 32, 56);

  ctx.shadowBlur = 8;
  ctx.font = "bold 16px monospace";
  ctx.fillStyle = "#ffe8aa";
  ctx.textAlign = "center";
  ctx.fillText(`MINTED  ${dateLabel}`, W / 2, H - 49);

  ctx.font = "13px monospace";
  ctx.fillStyle = "#bb9944";
  const minterLabel = minter.length > 20 ? minter.slice(0, 18) + "…" : minter;
  ctx.fillText(`MINTED BY  ${minterLabel}`, W / 2, H - 28);

  // Hex border streams
  ctx.shadowBlur = 0;
  ctx.font = "9px monospace";
  ctx.fillStyle = "#996600";
  const hexRow = "3F94101D3A1592935E6260A9288EFFBBDC7A1206230359AC73BFFBED28989B0E303F94101D3A1592935E";
  ctx.textAlign = "left";
  ctx.fillText(hexRow, 24, 18);
  ctx.fillText(hexRow.split("").reverse().join(""), 24, H - 4);

  // Watermark
  ctx.font = "italic 17px monospace";
  ctx.fillStyle = "#cc9922";
  ctx.textAlign = "right";
  ctx.fillText("wzrd.dog", W - 22, H - 88);
}

// ─── Coinbase relic — Pink NiceHash-style for solo miner blocks ──────────────

function drawCoinbaseRelic(ctx, dateLabel, ageYears, embedded, minter, blockHeight) {
  const W = 860, H = 860;

  ctx.fillStyle = "#1a0011";
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = "#2d0020";
  ctx.lineWidth = 1;
  for (let x = 18; x < W - 18; x += 17) { ctx.beginPath(); ctx.moveTo(x, 18); ctx.lineTo(x, H - 18); ctx.stroke(); }
  for (let y = 18; y < H - 18; y += 17) { ctx.beginPath(); ctx.moveTo(18, y); ctx.lineTo(W - 18, y); ctx.stroke(); }

  // Dense pink/purple blocks (more chaotic for coinbase)
  const PINK = ["#ff2277", "#ff55aa", "#cc0066", "#bb00ee", "#ff88cc"];
  for (let i = 0; i < 52; i++) {
    const col  = i % 13;
    const row  = Math.floor(i / 13);
    const x    = 28  + col * 62 + (row % 2 === 0 ?  8 : -6);
    const y    = 28  + row * 62 + (col % 3 === 0 ? 12 : -4);
    const w    = 44  + (i % 5)  * 14;
    const h    = 36  + (i % 7)  * 10;
    ctx.shadowBlur  = 20;
    ctx.shadowColor = "#ff00aa";
    ctx.fillStyle   = PINK[i % PINK.length];
    ctx.globalAlpha = 0.9;
    ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = "#ffbbee";
    ctx.lineWidth   = 3;
    ctx.shadowBlur  = 7;
    ctx.strokeRect(x + 3, y + 3, w - 6, h - 6);
  }
  ctx.shadowBlur = 0;

  // Central core
  ctx.fillStyle = "#220012";
  ctx.fillRect(230, 244, 400, 372);
  ctx.shadowBlur  = 50;
  ctx.shadowColor = "#ff44cc";
  ctx.strokeStyle = "#ff44cc";
  ctx.lineWidth   = 11;
  ctx.strokeRect(240, 254, 380, 352);

  // KOINU + embedded miner message
  ctx.shadowBlur  = 30;
  ctx.shadowColor = "#ff99ff";
  ctx.fillStyle   = "#ffbbff";
  ctx.font        = "bold 88px monospace";
  ctx.textAlign   = "center";
  ctx.fillText("KOINU", W / 2, 388);

  ctx.font      = "bold 25px monospace";
  ctx.fillStyle = "#ff99cc";
  ctx.fillText("RELIC", W / 2, 434);

  ctx.font      = "bold 22px monospace";
  ctx.fillStyle = "#ff4488";
  ctx.fillText(embedded, W / 2, 482); // e.g. "NICEHASH"

  ctx.font      = "bold 17px monospace";
  ctx.fillStyle = "#dd3366";
  ctx.fillText(`BLOCK  #${blockHeight.toLocaleString()}`, W / 2, 516);

  // Repeating miner label scattered across (exactly like Pob's NiceHash relic)
  ctx.shadowBlur = 6;
  ctx.font       = "12px monospace";
  ctx.fillStyle  = "#ffaadd";
  const rep = [embedded, embedded, "KOINU", "SOLO", "MINED", "DOGE", "ORD", "INSC", "BLOCK", "WZRD", embedded, "SHA256D"];
  rep.forEach((lbl, i) => {
    ctx.fillText(lbl, 52 + (i % 10) * 72, 52 + Math.floor(i / 10) * 90);
  });

  // Age / verified
  ctx.shadowBlur = 0;
  ctx.font       = "12px monospace";
  ctx.fillStyle  = "#994466";
  ctx.fillText(`${ageYears} years old  •  Solo mined block  •  Merkle Verified`, W / 2, 566);

  // Bottom bar
  ctx.fillStyle   = "#1f0018";
  ctx.fillRect(0, H - 82, W, 82);
  ctx.shadowBlur  = 16;
  ctx.shadowColor = "#ff55cc";
  ctx.strokeStyle = "#ff55cc";
  ctx.lineWidth   = 4;
  ctx.strokeRect(16, H - 72, W - 32, 56);

  ctx.shadowBlur = 8;
  ctx.font       = "bold 16px monospace";
  ctx.fillStyle  = "#ffccee";
  ctx.textAlign  = "center";
  ctx.fillText(`MINTED  ${dateLabel}`, W / 2, H - 49);

  ctx.font      = "13px monospace";
  ctx.fillStyle = "#cc6688";
  const minterLabel = minter.length > 20 ? minter.slice(0, 18) + "…" : minter;
  ctx.fillText(`MINTED BY  ${minterLabel}`, W / 2, H - 28);

  // Hex streams
  ctx.shadowBlur = 0;
  ctx.font       = "9px monospace";
  ctx.fillStyle  = "#882244";
  const hexRow   = "D06E3F94101D3A1592935E6260A9288EFFBBDC7A1206230359AC73BFFBED28989B0E303F9410";
  ctx.textAlign  = "left";
  ctx.fillText(hexRow, 24, 18);
  ctx.fillText(hexRow.split("").reverse().join(""), 24, H - 4);

  // Watermark
  ctx.font      = "italic 17px monospace";
  ctx.fillStyle = "#ee3388";
  ctx.textAlign = "right";
  ctx.fillText("wzrd.dog", W - 22, H - 88);
}

// ─── GO ──────────────────────────────────────────────────────────────────────
verifyAndRender();
</script>
</body>
</html>
